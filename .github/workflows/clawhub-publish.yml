name: Publish to ClawHub

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm run package:check

      - name: Dry-run ClawHub package
        run: npm run clawhub:dry-run

  publish:
    needs: validate
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.18.0
    with:
      source: ./clawpack/completetech-openclaw-mautic-plugin-0.1.13.tgz
      dry_run: false
      source_repo: CompleteTech-LLC-AI-Research/openclaw-mautic-plugin
      source_commit: ${{ github.sha }}
      source_ref: ${{ github.ref }}
      tags: latest,mautic,marketing-automation,crm,webhooks,openclaw
